<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, любимая! 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fce9f2 0%, #fbdeec 50%, #f7d4e6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: "🌸🌷🌼🌺";
            font-size: 100px;
            position: absolute;
            top: 20px;
            left: 20px;
            opacity: 0.15;
            transform: rotate(-10deg);
            pointer-events: none;
            white-space: nowrap;
        }
        body::after {
            content: "💐🌹🥀🌻";
            font-size: 120px;
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.1;
            transform: rotate(5deg);
            pointer-events: none;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 60px 60px 50px 50px;
            padding: 40px 30px;
            box-shadow: 0 25px 40px -10px rgba(255, 120, 180, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.9);
            text-align: center;
            z-index: 10;
        }
        .top-line {
            display: inline-block;
            background: #ffb8d0;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 8px 25px;
            border-radius: 40px;
            margin-bottom: 25px;
            border: 2px solid white;
            letter-spacing: 1px;
        }
        h1 {
            font-size: 3rem;
            color: #a1305a;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #ffd9e8;
        }
        .flower {
            font-size: 3rem;
            margin: 15px 0;
        }
        .greeting-text {
            font-size: 1.4rem;
            color: #802e50;
            font-weight: 500;
            line-height: 1.6;
            margin: 25px 0 35px;
            background: rgba(255, 255, 255, 0.6);
            padding: 25px;
            border-radius: 50px;
            border: 2px dashed #ffa5c0;
        }
        .next-btn {
            display: inline-block;
            background: #ff9ebe;
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 18px 45px;
            border-radius: 60px;
            text-decoration: none;
            box-shadow: 0 10px 0 #b34f72, 0 10px 25px #ffb0cf;
            border: 3px solid white;
            transition: 0.1s ease;
            margin-top: 15px;
        }
        .next-btn:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #b34f72, 0 5px 20px #ffb0cf;
        }
        .footer-note {
            margin-top: 35px;
            color: #ac4970;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="top-line">🌷 С 8 Марта 🌷</span>
        <h1>Любимая моя!</h1>
        <div class="flower">🌸💮🏵️</div>
        <div class="greeting-text">
            Ты — моё весеннее солнце.<br>
            Сегодня особенный день, и я подготовил для тебя небольшое путешествие.<br>
            Нажми «Начать», чтобы открыть все сюрпризы.
        </div>
        <a href="page2.html" class="next-btn">Начать ➔</a>
        <div class="footer-note">
            <span>Сделал специально для тебя 😊</span>
        </div>
    </div>
</body>
</html>
