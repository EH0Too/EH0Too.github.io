<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Найди все пары 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Quicksand', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fdddee, #fecfdf);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .game-box {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 30px 20px;
            border: 3px solid white;
            box-shadow: 0 20px 40px -5px #faaac5;
        }
        .top-header {
            background: #ffd5e5;
            padding: 12px 25px;
            border-radius: 60px;
            border: 2px solid white;
            font-weight: 600;
            color: #9e2f58;
            margin-bottom: 25px;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffe2f0;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid white;
            font-size: 1.4rem;
            font-weight: 700;
            color: #a1305a;
            margin-bottom: 25px;
        }
        .moves {
            background: white;
            padding: 5px 20px;
            border-radius: 40px;
        }
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 25px 0;
        }
        .memory-card {
            aspect-ratio: 1/1;
            background: #ffacc7;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            border: 3px solid white;
            box-shadow: 0 6px 0 #ba6080;
            cursor: pointer;
            transition: 0.1s;
        }
        .memory-card.flipped {
            background: white;
            color: #e65383;
            box-shadow: 0 4px 0 #ff9ebe;
        }
        .memory-card.matched {
            background: #c2e0b2;
            color: #2f6b2f;
            box-shadow: 0 4px 0 #7c9e67;
            pointer-events: none;
        }
        .next-btn-container {
            text-align: right;
            margin-top: 25px;
        }
        .next-btn {
            background: #ff9ebe;
            color: white;
            font-size: 1.6rem;
            font-weight: 700;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            border: 3px solid white;
            box-shadow: 0 7px 0 #b34b6b;
            transition: 0.1s;
        }
        .next-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b34b6b;
        }
        .footer-note {
            text-align: center;
            margin-top: 25px;
            color: #aa4570;
        }
    </style>
</head>
<body>
    <div class="game-box">
        <div class="game-header">
            <span>🌸 Найди все пары!</span>
            <span class="moves" id="movesDisplay">Ходы: 0</span>
        </div>
        <div class="memory-grid" id="memoryGrid"></div>

        <!-- Кнопка далее появится после победы -->
        <div id="nextButtonContainer" style="text-align: right; margin-top: 20px; display: none;">
            <a href="page4.html" class="next-btn">К сюрпризу →</a>
        </div>

        <div class="footer-note">Сделал специально для тебя 😊</div>
    </div>

    <script>
        const emojiSet = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊']; // 6 пар
        let cards = [];
        let flipped = [];
        let matched = 0;
        let moves = 0;
        let lock = false;
        let gameWon = false;

        const grid = document.getElementById('memoryGrid');
        const movesSpan = document.getElementById('movesDisplay');
        const nextBtnBox = document.getElementById('nextButtonContainer');

        function init() {
            let deck = [];
            emojiSet.forEach(emoji => {
                deck.push({ emoji, matched: false });
                deck.push({ emoji, matched: false });
            });
            deck.sort(() => Math.random() - 0.5);
            cards = deck;
            flipped = [];
            matched = 0;
            moves = 0;
            gameWon = false;
            nextBtnBox.style.display = 'none';
            updateMoves();
            render();
        }

        function render() {
            grid.innerHTML = '';
            cards.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'memory-card';
                if (card.matched) {
                    div.classList.add('matched');
                    div.innerText = card.emoji;
                } else if (flipped.includes(i)) {
                    div.classList.add('flipped');
                    div.innerText = card.emoji;
                } else {
                    div.innerText = '?';
                }
                div.addEventListener('click', () => handleClick(i));
                grid.appendChild(div);
            });
        }

        function handleClick(i) {
            if (lock || gameWon) return;
            if (cards[i].matched) return;
            if (flipped.includes(i)) return;
            if (flipped.length === 2) return;

            flipped.push(i);
            moves++;
            updateMoves();
            render();

            if (flipped.length === 2) {
                const [a, b] = flipped;
                if (cards[a].emoji === cards[b].emoji) {
                    cards[a].matched = true;
                    cards[b].matched = true;
                    matched++;
                    flipped = [];
                    render();
                    if (matched === emojiSet.length) {
                        gameWon = true;
                        nextBtnBox.style.display = 'block';
                    }
                } else {
                    lock = true;
                    setTimeout(() => {
                        flipped = [];
                        lock = false;
                        render();
                    }, 700);
                }
            }
        }

        function updateMoves() {
            movesSpan.innerText = `Ходы: ${moves}`;
        }

        init();
    </script>
</body>
</html>
